services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: public_key_registry
    volumes:
      - pg_data:/var/lib/postgresql/data

  api:
    build: .
    ports:
      - "7450:7450"
    depends_on:
      - db

volumes:
  pg_data: