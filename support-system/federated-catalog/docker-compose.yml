services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: federated_catalog
    volumes:
      - pg_data:/var/lib/postgresql/data

  api:
    build: .
    ports:
      - "7451:7451"
    depends_on:
      - db
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  pg_data:
